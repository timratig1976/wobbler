<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wobbler Bass Synth</title>
<style>
/* ── Reset & base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #1a1a2e;
  color: #e8e8f0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  overflow-x: hidden;
}
button { cursor: pointer; font-family: inherit; font-size: 10px; }
select { font-family: inherit; font-size: 10px; cursor: pointer; }
input  { font-family: inherit; }

/* ── Layout ───────────────────────────────────────────── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* HEADER */
#header {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 16px;
  background: #14142a;
  border-bottom: 1px solid #2a2a45;
  flex-shrink: 0;
}
#header h1 { font-size: 15px; letter-spacing: 3px; color: #fff; text-transform: uppercase; margin-right: auto; }
#header h1 span { color: #00ffb2; }
#midi-status {
  font-size: 9px; letter-spacing: 1px; padding: 3px 8px;
  border: 1px solid #222244; border-radius: 2px; color: #444;
}
#midi-status.active { color: #00ffb2; border-color: #00ffb2; }

#play-btn {
  padding: 6px 20px; border: 1px solid #00ffb2; border-radius: 3px;
  background: transparent; color: #00ffb2; font-size: 12px; letter-spacing: 1px;
  transition: background 0.15s, color 0.15s;
}
#play-btn:hover, #play-btn.playing { background: #00ffb2; color: #050510; }

.bpm-ctrl { display: flex; align-items: center; gap: 4px; }
.bpm-ctrl label { color: #888; font-size: 10px; letter-spacing: 1px; }
.bpm-btn {
  width: 20px; height: 20px; border: 1px solid #2a2a4a; border-radius: 2px;
  background: #0e0e28; color: #aaa; line-height: 1; font-size: 14px;
}
.bpm-btn:hover { border-color: #00ffb2; color: #00ffb2; }
#bpm-input {
  width: 44px; text-align: center; background: #0e0e28;
  border: 1px solid #2a2a4a; border-radius: 2px; color: #fff;
  padding: 2px 4px; font-size: 13px;
}

/* MAIN: 3-column voices */
#voices {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0; background: #0d0d1e;
  flex-shrink: 0;
}

.voice-col {
  background: #0d0d1e;
  overflow-y: auto; max-height: 72vh;
  padding: 10px 10px 20px;
}
.voice-col::-webkit-scrollbar { width: 4px; }
.voice-col::-webkit-scrollbar-track { background: #0a0a18; }
.voice-col::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 2px; }

.voice-header {
  font-size: 12px; letter-spacing: 3px; color: var(--accent);
  padding: 4px 0 12px; text-transform: uppercase; font-weight: bold;
  display: flex; align-items: center; gap: 8px; justify-content: space-between;
}

/* Sections */
.v-sec {
  margin-bottom: 8px;
  background: #15152a;
  border: 1px solid #2a2a45;
  border-radius: 4px;
  padding: 8px 10px 10px;
}
.sec-hdr {
  font-size: 9px; letter-spacing: 2px; color: var(--accent, #00ffb2);
  padding-bottom: 6px; margin-bottom: 8px;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.sec-bypass-btn {
  margin-left: auto; padding: 1px 5px; flex-shrink: 0;
  border: 1px solid #333355; border-radius: 2px;
  background: transparent; color: #555; font-size: 7px; letter-spacing: 1px;
  cursor: pointer; transition: all 0.15s;
}
.sec-bypass-btn.active { border-color: var(--accent); color: var(--accent); }
.sec-bypass-btn:not(.active) { border-color: #ff4466; color: #ff4466; }
.v-sec.sec-bypassed > *:not(.sec-hdr) { opacity: 0.3; pointer-events: none; }
.sec-hdr::before {
  content: ''; display: block; width: 2px; height: 9px;
  background: var(--accent, #00ffb2); border-radius: 1px; flex-shrink: 0;
  opacity: 0.7;
}

/* Button rows */
.btn-row { display: flex; gap: 3px; flex-wrap: nowrap; margin-bottom: 4px; }

.wave-btn, .ftype-btn {
  padding: 4px 8px; border: 1px solid #3a3a55; border-radius: 2px;
  background: #222240; color: #aaa; transition: all 0.1s; font-size: 8px;
  letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0;
}
.wave-btn:hover, .ftype-btn:hover { border-color: #66ffb2; color: #ccc; }
.wave-btn.active, .ftype-btn.active {
  background: #66ffb2; color: #0a0a14; border-color: #66ffb2;
  box-shadow: 0 0 3px rgba(102,255,178,0.4);
}

/* Knobs */
.knob-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: flex-start; align-items: flex-end;
}
.knob-wrap { display: flex; flex-direction: column; align-items: center; width: 54px; }
.knob-val  { font-size: 9px; color: #ccc; text-align: center; margin-top: 2px; min-height: 12px; }
.knob-lbl  { font-size: 8px; color: #888; text-align: center; letter-spacing: 1px; margin-top: 1px; }

/* LFO section */
.lfo-sec { padding: 0 !important; background: transparent !important; border: none !important; }
.lfo-sec .sec-hdr { margin-bottom: 6px; }

.lfo-row {
  background: #16163a;
  border: 1px solid #252560;
  border-radius: 4px;
  padding: 4px 8px;
  margin-bottom: 5px;
}
.lfo-row:last-child { margin-bottom: 0; }
.lfo-row.lfo-disabled { opacity: 0.5; }

.lfo-row-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 0 4px;
}
.lfo-en-btn {
  margin-left: auto; padding: 1px 7px; border-radius: 2px; font-size: 8px;
  border: 1px solid #333360; background: #1a1a38; color: #555; letter-spacing: 1px;
  cursor: pointer;
}
.lfo-en-btn.active { border-color: #66ffb2; color: #66ffb2; background: rgba(0,0,0,0.4); }

.lfo-row-body { padding-bottom: 4px; }

.lfo-row-top {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 6px; flex-wrap: wrap;
}
.lfo-row-bot {
  display: flex; align-items: flex-end; gap: 8px; flex-wrap: wrap;
}

.lfo-num {
  font-size: 8px; color: #66ffb2; width: 14px; height: 14px;
  border: 1px solid currentColor; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; opacity: 0.8; font-weight: bold;
}
.lfo-wave { display: flex; gap: 2px; }
.lfo-w-btn {
  min-width: 22px; height: 18px; border: 1px solid #2a2a50; border-radius: 2px;
  background: #1a1a38; color: #888; font-size: 8px; padding: 0 4px;
}
.lfo-w-btn.active {
  background: #66ffb2; color: #050510;
  border-color: #66ffb2; font-weight: bold;
}
.lfo-knob-wrap .knob-wrap { width: 48px; }
.lfo-knob-wrap .knob-wrap canvas { width: 40px !important; height: 40px !important; }

.lfo-sync-btn {
  padding: 2px 6px; border: 1px solid #2a2a50; border-radius: 2px;
  background: #1a1a38; color: #888; font-size: 8px;
}
.lfo-sync-btn.active { border-color: #66ffb2; color: #66ffb2; background: rgba(0,0,0,0.4); }

.mini-sel {
  background: #1a1a38; border: 1px solid #2a2a50; border-radius: 2px;
  color: #bbb; padding: 2px 4px; max-width: 68px; min-width: 40px;
  appearance: none; -webkit-appearance: none; text-align: center; font-size: 9px;
}
.mini-sel:focus { outline: none; border-color: #66ffb2; color: #ccc; }

.lfo-meta-row { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.lfo-meta-lbl { font-size: 8px; color: #555; letter-spacing: 1px; }

/* SEQUENCER (in voice columns) */
.voice-seq-section {
  margin-top: 4px;
}
.voice-seq-play-btn {
  margin-left: auto; padding: 1px 7px; flex-shrink: 0;
  border: 1px solid #2a2a45; border-radius: 2px;
  background: #1a1a30; color: #666; font-size: 9px;
  transition: all 0.15s; cursor: pointer; line-height: 1.4;
}
.voice-seq-play-btn:hover { border-color: var(--accent); color: var(--accent); }
.voice-seq-play-btn.active { 
  border-color: var(--accent); color: var(--accent);
}
.seq-grid {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 3px;
}
.seq-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.seq-btn {
  width: 100%; height: 28px; border: 1px solid #2a2a4a; border-radius: 2px;
  background: #18183a; color: #666; font-size: 9px;
  transition: all 0.1s;
}
.seq-btn:hover  { border-color: #66ffb2; color: #aaa; }
.seq-btn.active { background: #0d2a20; border-color: #66ffb2; color: #66ffb2; }
.seq-btn.playing{ background: #66ffb2 !important; color: #050510 !important; box-shadow: 0 0 8px #66ffb2; }

.seq-note {
  width: 100%; background: #14142e; border: 1px solid #1e1e38;
  border-radius: 2px; color: #666; padding: 1px 0; font-size: 9px;
  text-align: center; appearance: none; -webkit-appearance: none;
}
.seq-note:focus { border-color: #66ffb2; outline: none; }

.seq-acc {
  width: 100%; height: 14px; border: 1px solid #1e1e38; border-radius: 2px;
  background: #14142e; color: #555; font-size: 9px; line-height: 1; padding: 0;
}
.seq-acc.active { background: #3a1a00; border-color: #ff6b35; color: #ff6b35; }

/* MASTER */
#master-section {
  background: #0f0f24;
  padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start;
  flex-shrink: 0;
}
#master-section .sec-hdr { width: 100%; margin-bottom: 2px; }

.mix-row { display: flex; gap: 12px; }
.mix-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.mix-lbl { font-size: 9px; letter-spacing: 1px; }
.mix-mute-btn {
  padding: 2px 8px; border: 1px solid #222244; border-radius: 2px;
  background: #0e0e28; color: #555; font-size: 9px;
}
.mix-mute-btn.active { background: #3a0a0a; border-color: #ff4444; color: #ff4444; }
.mix-btn-row { display:flex; gap:3px; }
.mix-solo-btn {
  padding: 2px 8px; border: 1px solid #222244; border-radius: 2px;
  background: #0e0e28; color: #555; font-size: 9px;
}
.mix-solo-btn.active { background: #2a2500; border-color: #ffcc00; color: #ffcc00; }

.fx-row { flex-wrap: nowrap; gap: 10px; }

/* Visualizer */
.viz-container {
  display: flex; flex-direction: column; gap: 4px; flex: 1;
}
.viz-controls {
  display: flex; gap: 4px; align-items: center;
}
.viz-toggle-btn {
  padding: 3px 10px; border: 1px solid #2a2a4a; border-radius: 2px;
  background: #0e0e28; color: #888; font-size: 9px; letter-spacing: 1px;
  transition: all 0.15s;
}
.viz-toggle-btn.active {
  background: #66ffb2; color: #050510; border-color: #66ffb2;
}
.viz-metrics {
  margin-left: auto; display: flex; gap: 12px; font-size: 9px; color: #666;
}
.viz-metric { letter-spacing: 0.5px; }
.viz-metric-val { color: #66ffb2; font-weight: bold; }
#viz {
  flex: 1; min-width: 200px; height: 80px;
  border: 1px solid #1a1a3a; border-radius: 3px;
  display: block;
}

/* Glow effect on accent elements */
.wave-btn.active   { box-shadow: 0 0 6px #66ffb2; }
.seq-btn.active    { box-shadow: 0 0 4px rgba(102,255,178,0.3); }

/* Per-voice power toggle */
.voice-toggle {
  margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.voice-toggle-lbl { font-size: 8px; color: #555; letter-spacing: 1px; transition: color 0.15s; }
.voice-toggle input { display: none; }
.voice-toggle-track {
  position: relative; width: 30px; height: 16px; cursor: pointer;
  background: #1a1a38; border: 1px solid #252550; border-radius: 8px;
  transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
}
.voice-toggle-track::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #333355; transition: left 0.2s, background 0.2s;
}
.voice-toggle input:checked + .voice-toggle-track {
  background: #66ffb2; border-color: #66ffb2;
  box-shadow: 0 0 6px #66ffb2;
}
.voice-toggle input:checked + .voice-toggle-track::after {
  left: 16px; background: #050510;
}
.voice-toggle input:checked ~ .voice-toggle-lbl { color: #66ffb2; }

/* Dim entire column when voice is off */
.voice-col.voice-off .v-sec {
  opacity: 0.25; pointer-events: none; transition: opacity 0.2s;
}
.voice-col.voice-off .osc-wave-preview { opacity: 0.25; transition: opacity 0.2s; }

/* Waveform preview canvas */
.osc-wave-preview {
  display: block;
  width: 100%;
  height: 82px;
  border-radius: 3px;
  background: #0a0a18;
  border: 1px solid #1a1a30;
  margin-bottom: 6px;
  cursor: default;
}

/* 2-column Filter layout */
.filter-cols {
  display: flex; gap: 8px; align-items: flex-start;
}
.filter-left { flex: 2; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.filter-right {
  flex: 1; max-width: 33%; min-width: 70px; display: flex; flex-direction: column; gap: 4px;
  background: #0a0a1e; border: 1px solid #141430;
  border-radius: 3px; padding: 6px 6px 8px;
}
.filter-curve {
  display: block; width: 100%; height: 90px;
  border-radius: 3px; background: #15152a;
  border: 1px solid #252545;
}
.filter-curve-labels {
  display: flex; justify-content: space-between;
  font-size: 7px; color: #444; padding: 0 2px; margin-top: 1px;
}

/* Distortion — 2-column layout matching ADSR */
.dist-cols {
  display: flex; gap: 8px; align-items: stretch;
}
.dist-left  { flex: 2; min-width: 0; display: flex; flex-direction: column; gap: 6px; justify-content: center; }
.dist-right {
  flex: 1; min-width: 80px; max-width: 40%; display: flex; flex-direction: column;
  background: #0a0a1e; border: 1px solid #141430;
  border-radius: 3px; padding: 4px;
}
.dist-canvas {
  display: block; width: 100%; flex: 1; min-height: 80px;
  border-radius: 2px; background: #030308;
  border: 1px solid #252545;
}

/* ADSR — filter-style 2-column layout */
.adsr-cols {
  display: flex; gap: 8px; align-items: stretch;
}
.adsr-left  { flex: 2; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.adsr-right {
  flex: 1; min-width: 70px; max-width: 33%; display: flex; flex-direction: column;
  background: #0a0a1e; border: 1px solid #141430;
  border-radius: 3px; padding: 4px;
}
.adsr-canvas {
  display: block; width: 100%; flex: 1; min-height: 68px;
  border-radius: 2px; background: #030308;
  border: 1px solid #252545; margin-bottom: 0;
  cursor: crosshair;
}

/* Patch bar */
.patch-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
  padding: 8px 10px; margin-bottom: 10px;
  background: #0f0f28; border: 1px solid #252548; border-radius: 4px;
}
.patch-name-input {
  background: #18183a; border: 1px solid #2e2e54; border-radius: 3px;
  color: #ddd; padding: 3px 8px; font-size: 10px; font-family: inherit;
  width: 130px; flex-shrink: 0;
}
.patch-name-input:focus { outline: none; border-color: #66ffb2; }
.patch-select {
  background: #18183a; color: #ccc; border: 1px solid #2e2e54; border-radius: 3px;
  padding: 3px 6px; font-size: 10px; min-width: 120px; flex-shrink: 0;
}
.patch-btn {
  padding: 3px 10px; border: 1px solid #2e2e50; border-radius: 3px;
  background: #18183a; color: #aaa; font-size: 9px; letter-spacing: 0.5px;
  white-space: nowrap; flex-shrink: 0; transition: all 0.1s;
}
.patch-btn:hover { border-color: #66ffb2; color: #66ffb2; }
.patch-save  { border-color: #66ffb2; color: #66ffb2; }
.patch-save:hover { background: #66ffb2; color: #050510; }
.patch-load  { border-color: #a855f7; color: #a855f7; }
.patch-load:hover { background: #a855f7; color: #050510; }
.patch-del   { border-color: #444; color: #555; }
.patch-del:hover { border-color: #ff4444; color: #ff4444; }
.patch-sep { width: 1px; height: 18px; background: #1e1e40; flex-shrink: 0; }

/* TWE — Temporal Wobble Engine */
.twe-sec { display: flex; flex-direction: column; gap: 6px; }
.twe-preset-bar {
  display: flex; align-items: center; gap: 3px; flex-wrap: wrap;
  padding: 4px 6px; margin-bottom: 4px;
  background: #07071c; border: 1px solid #1a1a38; border-radius: 3px;
}
.twe-preset-btn {
  padding: 3px 8px; border: 1px solid #1e1e40; border-radius: 2px;
  background: #0c0c26; color: #888; font-size: 8px; letter-spacing: 0.5px;
  white-space: nowrap; flex-shrink: 0; cursor: pointer; transition: all 0.1s;
}
.twe-preset-btn:hover { border-color: #66ffb2; color: #66ffb2; }
.twe-preset-random { border-color: #ff8844; color: #ff8844; }
.twe-preset-random:hover { background: #ff8844; color: #050510; }
.twe-preset-ai { border-color: #a855f7; color: #a855f7; }
.twe-preset-ai:hover { background: #a855f7; color: #050510; }
.twe-preset-sep { width: 1px; height: 16px; background: #1e1e40; flex-shrink: 0; margin: 0 2px; }
.twe-preview {
  display: block; width: 100%; height: 70px;
  border-radius: 3px; background: #030308;
  border: 1px solid #111120; margin-bottom: 2px;
}
.twe-pat-bar {
  display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;
  padding: 4px 0; margin-bottom: 2px;
}
.twe-pat-sel { min-width: 100px; max-width: 130px; }
.twe-header { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; margin-bottom: 2px; }
.twe-ratemod-btn {
  padding: 3px 8px; border: 1px solid #1e1e40; border-radius: 3px;
  background: #0c0c26; color: #555; font-size: 8px; letter-spacing: 0.5px;
  white-space: nowrap; flex-shrink: 0; cursor: pointer;
}
.twe-ratemod-btn.active { background: #66ffb2; color: #050510; border-color: #66ffb2; font-weight: bold; }
.twe-slot {
  display: flex; align-items: center; flex-wrap: nowrap; gap: 6px;
  background: #08081a; border: 1px solid #12122a; border-radius: 3px; padding: 4px 6px;
}
.twe-lane-toggle {
  padding: 1px 4px; border: 1px solid #333355; border-radius: 2px; flex-shrink: 0;
  background: transparent; color: #555; font-size: 7px; letter-spacing: 1px;
  cursor: pointer; transition: all 0.15s; margin-left: auto;
}
.twe-lane-toggle.active { border-color: var(--accent); color: var(--accent); }
.twe-lane-toggle:not(.active) { border-color: #ff4466; color: #ff4466; }
.twe-selected { background: rgba(255,255,255,0.02) !important; }
.twe-slot-label {
  font-size: 8px; letter-spacing: 1px; color: #66ffb2; opacity: 0.7;
  text-transform: uppercase; min-width: 36px; flex-shrink: 0;
}
.twe-target-sel {
  background: #0c0c26; color: #999; border: 1px solid #1e1e40; border-radius: 2px;
  font-size: 8px; padding: 2px 3px; flex-shrink: 0; max-width: 72px; cursor: pointer;
}
.twe-shape-row { display: flex; gap: 2px; flex-shrink: 0; }
.dist-form-row  { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
.twe-shape-row .wave-btn { padding: 2px 5px; font-size: 7.5px; }
.twe-sync-row { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.twe-sync-btn {
  padding: 2px 6px; border: 1px solid #1e1e40; border-radius: 2px;
  background: #0c0c26; color: #555; font-size: 8px; letter-spacing: 0.5px;
  white-space: nowrap; flex-shrink: 0; cursor: pointer;
}
.twe-sync-btn.active { background: #66ffb2; color: #050510; border-color: #66ffb2; font-weight: bold; }
.twe-div-sel {
  background: #0c0c26; color: #999; border: 1px solid #1e1e40; border-radius: 2px;
  font-size: 8px; padding: 2px 3px; max-width: 44px; flex-shrink: 0; cursor: pointer;
}
.twe-mod-btn {
  padding: 2px 5px; border: 1px solid #1e1e40; border-radius: 2px;
  background: #0c0c26; color: #555; font-size: 8px; font-weight: bold;
  flex-shrink: 0; cursor: pointer;
}
.twe-mod-btn.active { background: #ff8844; color: #050510; border-color: #ff8844; }

/* TWE Redesign — nested main + aux lanes */
.twe-lanes { display: flex; flex-direction: column; gap: 5px; }
.twe-main-block, .twe-aux-block {
  background: #07071c; border: 1px solid #1a1a38; border-radius: 4px; overflow: hidden;
}
.twe-block-hdr {
  display: flex; align-items: center; gap: 6px; padding: 5px 7px;
  background: #0a0a20; border-bottom: 1px solid #151530; flex-wrap: nowrap;
}
.twe-block-lbl { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; flex: 1; }
.twe-expand-btn {
  padding: 2px 7px; border: 1px solid #1e1e40; border-radius: 2px;
  background: #0c0c26; color: #555; font-size: 7.5px; cursor: pointer; white-space: nowrap;
}
.twe-expand-btn:hover { color: #aaa; border-color: #2a2a50; }
.twe-remove-btn {
  padding: 1px 5px; border: 1px solid #3a1a1a; border-radius: 2px;
  background: #1a0a0a; color: #664444; font-size: 9px; cursor: pointer;
}
.twe-remove-btn:hover { background: #ff3333; color: #fff; border-color: #ff3333; }
.twe-core-controls { padding: 5px 7px; display: flex; flex-direction: column; gap: 4px; }
.twe-ctrl-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.twe-sub-components { display: flex; flex-direction: column; gap: 0; border-top: 1px solid #111128; }
.twe-sub-block { border-bottom: 1px solid #0e0e22; }
.twe-sub-block:last-child { border-bottom: none; }
.twe-sub-hdr {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  background: #090918; cursor: default;
}
.twe-sub-lbl { font-size: 7.5px; letter-spacing: 0.8px; color: #888; text-transform: uppercase; flex: 1; }
.twe-sub-controls { padding: 4px 10px 5px; display: flex; flex-direction: column; gap: 3px; }
.twe-aux-controls { padding: 5px 7px; display: flex; flex-direction: column; gap: 4px; }
.twe-add-aux-btn {
  padding: 5px; border: 1px dashed #1e1e40; border-radius: 3px;
  background: transparent; color: #444; font-size: 8px; letter-spacing: 0.5px;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.twe-add-aux-btn:hover { border-color: #4455aa; color: #8899cc; }
/* Draw curve canvas */
.twe-draw-wrap { padding: 5px 7px; border-top: 1px solid #111128; background: #050510; }
.twe-draw-canvas { display: block; width: 100%; height: 72px; border-radius: 2px; cursor: crosshair; border: 1px solid #1a1a38; }
.twe-draw-btns { display: flex; gap: 5px; margin-top: 4px; }
.twe-draw-presets { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.twe-draw-preset-btn { padding: 2px 5px; font-size: 8px; background: #0c0c26; border: 1px solid #1e1e40; color: #888; border-radius: 2px; cursor: pointer; white-space: nowrap; }
.twe-draw-preset-btn:hover { background: #1a1a3a; color: #bbb; border-color: #3a3a60; }
.twe-draw-ai-row { display: flex; gap: 4px; margin-top: 4px; }
.twe-draw-ai-input { flex: 1; background: #08081c; border: 1px solid #2a2a50; color: #ccc; font-size: 9px; padding: 3px 6px; border-radius: 2px; outline: none; }
.twe-draw-ai-input:focus { border-color: #6644aa; }
.twe-draw-ai-btn { padding: 3px 8px; background: #1a0a2a; border: 1px solid #6644aa; color: #cc88ff; font-size: 8px; border-radius: 2px; cursor: pointer; white-space: nowrap; }
.twe-draw-ai-btn:hover { background: #2a1a3a; color: #ee99ff; }
.twe-draw-apply { padding: 3px 10px; background: #1a3a1a; border: 1px solid #2a5a2a; color: #66ff66; font-size: 8px; border-radius: 2px; cursor: pointer; }
.twe-draw-apply:hover { background: #2a5a2a; }
.twe-draw-reset { padding: 3px 8px; background: #2a1010; border: 1px solid #5a2a2a; color: #ff8888; font-size: 8px; border-radius: 2px; cursor: pointer; }
.twe-draw-reset:hover { background: #3a1818; border-color: #ff4444; }
.twe-draw-close  { padding: 3px 8px; background: #1a1a2a; border: 1px solid #2a2a40; color: #666; font-size: 9px; border-radius: 2px; cursor: pointer; }
.twe-draw-close:hover { color: #ff6666; border-color: #ff6666; }
.twe-shape-row .twe-draw-btn { border-color: #6644aa; color: #9966dd; }
.twe-shape-row .twe-draw-btn.active { background: #6644aa; color: #fff; border-color: #9966dd; }

/* OSC — filter-style 2-column layout */
.osc-cols {
  display: flex; gap: 8px; align-items: flex-start;
}
.osc-left  { flex: 2; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.osc-right {
  flex: 1.3; min-width: 130px; display: flex; flex-direction: row; align-items: flex-start; gap: 10px;
  background: #0a0a1e; border: 1px solid #141430;
  border-radius: 3px; padding: 6px;
}
.osc-right .osc-wave-preview { width: 62px; height: 90px; flex-shrink: 0; }
/* Noise strip inside osc-right — two-column layout matching filter/ADSR */
.osc-noise-strip {
  flex: 1; min-width: 0;
  border-left: 1px solid #1a1a38; padding-left: 8px;
}
/* Two-column layout inside noise strip */
.noise-cols {
  display: flex; gap: 6px; align-items: stretch;
}
.noise-left {
  flex: 2; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; gap: 4px;
}
.noise-right {
  flex: 1; min-width: 52px; display: flex; flex-direction: column;
  background: #030308; border: 1px solid #111120; border-radius: 2px; padding: 2px;
}
.noise-strip-lbl {
  font-size: 7px; letter-spacing: 1.5px; color: #66ffb2;
  text-transform: uppercase; flex-shrink: 0;
}
.noise-type-row {
  display: flex; align-items: center; gap: 2px;
}
.noise-strip-type-lbl {
  font-size: 8px; color: #ccc; flex: 1; text-align: center;
  letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.noise-nav-btn {
  width: 14px; height: 14px; background: #111128; border: 1px solid #1a1a3a;
  border-radius: 2px; color: #888; font-size: 9px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0; flex-shrink: 0;
}
.noise-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.noise-preview {
  display: block; width: 100%; flex: 1; min-height: 68px;
  border-radius: 1px; background: transparent; border: none;
}
.noise-left .knob-row { justify-content: flex-start; margin: 0; }

/* Piano keyboard */
#piano-section {
  background: #0a0a1a; border-top: 1px solid #1a1a35;
  padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0;
}
.piano-toolbar {
  display: flex; align-items: center; gap: 10px;
  font-size: 9px; letter-spacing: 1px; color: #555;
}
.piano-hint { font-size: 8px; color: #333; letter-spacing: 0.5px; }
.piano-wrap {
  position: relative; display: flex; user-select: none;
  touch-action: none;
}
.piano-white {
  position: relative; width: 36px; height: 90px; flex-shrink: 0;
  background: #e8e8f8; border: 1px solid #888; border-radius: 0 0 4px 4px;
  cursor: pointer; transition: background 0.04s;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px;
}
.piano-white.active { background: #00ffb2; border-color: #00ccaa; }
.piano-white .piano-key-lbl {
  font-size: 7px; color: #888; pointer-events: none; letter-spacing: 0px;
}
.piano-white.active .piano-key-lbl { color: #050510; }
.piano-black {
  position: absolute; width: 22px; height: 55px; z-index: 2;
  background: #1a1a2e; border: 1px solid #000; border-radius: 0 0 3px 3px;
  cursor: pointer; transition: background 0.04s;
}
.piano-black.active { background: #007a55; border-color: #00ffb2; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <h1>WOBBLER <span>BASS</span></h1>
    <div id="midi-status">NO MIDI</div>
    <button id="play-btn">▶ PLAY</button>
    <div class="bpm-ctrl">
      <label>BPM</label>
      <button id="bpm-down" class="bpm-btn">−</button>
      <input id="bpm-input" type="number" value="120" min="40" max="240">
      <button id="bpm-up" class="bpm-btn">+</button>
    </div>
  </header>

  <!-- 3 VOICE COLUMNS -->
  <div id="voices">
    <div class="voice-col" id="voice-1"></div>
    <div class="voice-col" id="voice-2"></div>
    <div class="voice-col" id="voice-3"></div>
  </div>

  <!-- MASTER -->
  <section id="master-section">
    <div class="sec-hdr">MASTER</div>
  </section>

  <!-- PIANO KEYBOARD -->
  <div id="piano-section"></div>

</div>
<script src="synth.js"></script>
<script src="piano.js"></script>
</body>
</html>

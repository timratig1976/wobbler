*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;
  min-height:100vh;overflow-x:hidden;padding-bottom:30px;font-size:11px}
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.065) 2px,rgba(0,0,0,.065) 4px);
  pointer-events:none;z-index:900}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,204,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,.018) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none}

/* ---- HEADER ---- */
header{padding:14px 22px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:relative;z-index:10}
.logo{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;color:var(--a);text-shadow:var(--ga);line-height:1}
.logo span{color:var(--a2);text-shadow:var(--ga2)}
.logo-sub{font-size:8px;color:var(--dim);letter-spacing:3px;margin-top:2px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:18px}
.bpm-block{text-align:right}
.bpm-num{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--a3);text-shadow:0 0 16px rgba(255,204,0,.5);line-height:1;cursor:default}
.bpm-lbl{font-size:8px;color:var(--dim);letter-spacing:3px}

/* ---- LAYOUT ---- */
.main{display:grid;grid-template-columns:268px 1fr 236px;gap:2px;padding:2px}
.col{background:var(--panel);border:1px solid var(--border);padding:13px;overflow:hidden}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--dim);
  margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

// -- Synthesized drum sound functions --
function synthKick(t, tune, vel, dest) {
  const env = AC.createGain();
  env.gain.setValueAtTime(vel * 1.4, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

  const osc = AC.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(140 * tune, t);
  osc.frequency.exponentialRampToValueAtTime(35 * tune, t + 0.08);

  // Click transient
  const click = AC.createOscillator();
  click.type = 'triangle';
  click.frequency.setValueAtTime(800 * tune, t);
  click.frequency.exponentialRampToValueAtTime(60 * tune, t + 0.02);
  const clickG = AC.createGain();
  clickG.gain.setValueAtTime(vel * 0.5, t);
  clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

  // Sub thump
  const sub = AC.createOscillator();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(55 * tune, t);
  const subG = AC.createGain();
  subG.gain.setValueAtTime(vel * 0.8, t);
  subG.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

  osc.connect(env); env.connect(dest);
  click.connect(clickG); clickG.connect(dest);
  sub.connect(subG); subG.connect(dest);
  osc.start(t); osc.stop(t + 0.55);
  click.start(t); click.stop(t + 0.06);
  sub.start(t); sub.stop(t + 0.45);
}

function synthSnare(t, tune, vel, dest) {
  // Tonal body
  const osc = AC.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200 * tune, t);
  osc.frequency.exponentialRampToValueAtTime(80 * tune, t + 0.1);
  const oscG = AC.createGain();
  oscG.gain.setValueAtTime(vel * 0.7, t);
  oscG.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

  // Noise snare body
  const bufLen = Math.ceil(AC.sampleRate * 0.3);
  const nBuf = AC.createBuffer(1, bufLen, AC.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = AC.createBufferSource(); nSrc.buffer = nBuf;
  const nFilt = AC.createBiquadFilter(); nFilt.type = 'bandpass';
  nFilt.frequency.value = 2200 * tune; nFilt.Q.value = 0.8;
  const nG = AC.createGain();
  nG.gain.setValueAtTime(vel * 0.9, t);
  nG.gain.exponentialRampToValueAtTime(0.001, t + 0.22);

  osc.connect(oscG); oscG.connect(dest);
  nSrc.connect(nFilt); nFilt.connect(nG); nG.connect(dest);
  osc.start(t); osc.stop(t + 0.25);
  nSrc.start(t); nSrc.stop(t + 0.3);
}

function synthClap(t, tune, vel, dest) {
  // 3 layered noise bursts with tiny delays \u2014 classic clap scatter
  [0, 0.01, 0.02].forEach((delay, i) => {
    const bufLen = Math.ceil(AC.sampleRate * 0.15);
    const buf = AC.createBuffer(1, bufLen, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < bufLen; j++) d[j] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 1000 * tune;
    const g = AC.createGain();
    g.gain.setValueAtTime(vel * (i === 2 ? 1.0 : 0.5), t + delay);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.12);
    src.connect(flt); flt.connect(g); g.connect(dest);
    src.start(t + delay); src.stop(t + delay + 0.2);
  });
}

function synthHHClosed(t, tune, vel, dest) {
  const bufLen = Math.ceil(AC.sampleRate * 0.08);
  const buf = AC.createBuffer(1, bufLen, AC.sampleRate);
  const d = buf.getChannelData(0);
  // Metallic: sum of inharmonic sines \u2192 approximated via filtered noise
  for (let i = 0; i < bufLen; i++) {
    d[i] = (Math.random() * 2 - 1) * 0.5 +
            Math.sin(i * 2 * Math.PI * 8000 / AC.sampleRate) * 0.3 +
            Math.sin(i * 2 * Math.PI * 12000 / AC.sampleRate) * 0.2;
  }
  const src = AC.createBufferSource(); src.buffer = buf;
  const flt = AC.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 6000 * tune;
  const g = AC.createGain();
  g.gain.setValueAtTime(vel * 0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
  src.connect(flt); flt.connect(g); g.connect(dest);
  src.start(t); src.stop(t + 0.09);
}

function synthHHOpen(t, tune, vel, dest) {
  const bufLen = Math.ceil(AC.sampleRate * 0.5);
  const buf = AC.createBuffer(1, bufLen, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    d[i] = (Math.random() * 2 - 1) * 0.4 +
            Math.sin(i * 2 * Math.PI * 7500 / AC.sampleRate) * 0.25 +
            Math.sin(i * 2 * Math.PI * 11200 / AC.sampleRate) * 0.2 +
            Math.sin(i * 2 * Math.PI * 14500 / AC.sampleRate) * 0.15;
  }
  const src = AC.createBufferSource(); src.buffer = buf;
  const flt = AC.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 5000 * tune;
  const flt2 = AC.createBiquadFilter(); flt2.type = 'peaking'; flt2.frequency.value = 10000; flt2.gain.value = 4;
  const g = AC.createGain();
  g.gain.setValueAtTime(vel * 0.7, t);
  g.gain.setTargetAtTime(0.001, t + 0.05, 0.12);
  src.connect(flt); flt.connect(flt2); flt2.connect(g); g.connect(dest);
  src.start(t); src.stop(t + 0.55);
}

function synthRide(t, tune, vel, dest) {
  // Bell: 3 sine oscillators at inharmonic frequencies
  [[800,0.5],[1200,0.35],[1800,0.2],[2700,0.1]].forEach(([f, a]) => {
    const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f * tune;
    const g = AC.createGain();
    g.gain.setValueAtTime(vel * a, t);
    g.gain.setTargetAtTime(0.001, t, 0.25);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t + 1.2);
  });
  // Bow noise
  const bLen = Math.ceil(AC.sampleRate * 0.4);
  const bBuf = AC.createBuffer(1, bLen, AC.sampleRate);
  const bd = bBuf.getChannelData(0);
  for (let i = 0; i < bLen; i++) bd[i] = (Math.random() * 2 - 1);
  const bSrc = AC.createBufferSource(); bSrc.buffer = bBuf;
  const bFlt = AC.createBiquadFilter(); bFlt.type = 'bandpass'; bFlt.frequency.value = 5000 * tune; bFlt.Q.value = 3;
  const bG = AC.createGain(); bG.gain.setValueAtTime(vel * 0.15, t); bG.gain.setTargetAtTime(0.001, t + 0.02, 0.15);
  bSrc.connect(bFlt); bFlt.connect(bG); bG.connect(dest);
  bSrc.start(t); bSrc.stop(t + 0.45);
}

function synthPerc1(t, tune, vel, dest) {
  // Tom-like: pitched with noise layer
  const osc = AC.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(280 * tune, t);
  osc.frequency.exponentialRampToValueAtTime(100 * tune, t + 0.12);
  const og = AC.createGain(); og.gain.setValueAtTime(vel * 0.9, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

  const bLen = Math.ceil(AC.sampleRate * 0.1);
  const nBuf = AC.createBuffer(1, bLen, AC.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < bLen; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = AC.createBufferSource(); nSrc.buffer = nBuf;
  const nFlt = AC.createBiquadFilter(); nFlt.type = 'bandpass'; nFlt.frequency.value = 1800 * tune; nFlt.Q.value = 2;
  const ng = AC.createGain(); ng.gain.setValueAtTime(vel * 0.4, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

}

function synthPerc2(t, tune, vel, dest) {
  // Clave / woodblock: sharp pitched transient
  const osc = AC.createOscillator(); osc.type = 'square';
  osc.frequency.setValueAtTime(900 * tune, t);
  osc.frequency.exponentialRampToValueAtTime(600 * tune, t + 0.04);

}

const DRUM_SYNTHS = {
  kick:   synthKick,
  snare:  synthSnare,
  clap:   synthClap,
  hhc:    synthHHClosed,
  hho:    synthHHOpen,
  ride:   synthRide,
  perc1:  synthPerc1,
  perc2:  synthPerc2,

// -- Init drum audio chain --
function initDrumChain() {
  if (!AC) return;
  if (drumGainNode) return;
  drumGainNode = AC.createGain(); drumGainNode.gain.value = drumMasterVolume;
  drumAnalyser = AC.createAnalyser(); drumAnalyser.fftSize = 512;
  drumGainNode.connect(drumAnalyser); drumAnalyser.connect(AC.destination);
}

// -- Schedule drum hit --
function schedDrumHit(trackId, time, stepIdx) {
  if (!drumPat[trackId][stepIdx]) return;
  if (drumMuted[trackId]) return;
  if (!AC || !drumGainNode) return;

  const track = DRUM_TRACKS.find(t => t.id === trackId);
  const vel = drumVels[trackId][stepIdx] * (track.vol / 100);
  const tune = track.tune;

  // Humanize timing if set (tiny random offset)
  const jitter = 0; // humanize adds this
  const synthFn = DRUM_SYNTHS[trackId];
  if (synthFn) synthFn(time + jitter, tune, Math.min(1, vel), drumGainNode);
}

// -- Drum scheduler (called by main scheduler) --
function scheduleDrums(time, stepIdx) {
  DRUM_TRACKS.forEach(t => schedDrumHit(t.id, time, stepIdx));
}

// -- Build Drum UI --
function buildDrumUI() {
  // Preset buttons
  const pr = document.getElementById('drumPresetRow');
  Object.keys(DRUM_PRESETS).forEach(name => {
    const b = document.createElement('button');
    b.className = 'dpbtn'; b.textContent = name;
    b.addEventListener('click', () => {
      loadDrumPreset(name);
      document.querySelectorAll('.dpbtn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    });
    pr.appendChild(b);
  });

  // Beat markers
  const bm = document.getElementById('drumBeatMarkers');

  ['',''].forEach(() => { const d = document.createElement('div'); bm.appendChild(d); });
  // Inject proper markers
  bm.style.display = 'grid';
  bm.style.gridTemplateColumns = '64px repeat(16,1fr) 56px 48px';
  bm.style.gap = '2px';
  bm.style.marginBottom = '3px';
  bm.innerHTML = '<div></div>';
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'dbm' + (i % 4 === 0 ? ' db' : '');
    d.textContent = i % 4 === 0 ? (i / 4 + 1) : '\u00b7';
    d.style.fontSize = '7px'; d.style.textAlign = 'center';
    bm.appendChild(d);
  }
  bm.appendChild(document.createElement('div'));
  bm.appendChild(document.createElement('div'));

  // Drum rows
  const rows = document.getElementById('drumRows');
  rows.innerHTML = '';
  DRUM_TRACKS.forEach(track => {
    const row = document.createElement('div');
    row.className = 'drum-grid';
    row.id = `drow-${track.id}`;

    // Name label (click = mute)
    const nameEl = document.createElement('div');
    nameEl.className = 'drum-name';
    nameEl.textContent = track.name;
    nameEl.style.color = track.color;
    nameEl.title = 'Click to mute';
    nameEl.addEventListener('click', () => {
      drumMuted[track.id] = !drumMuted[track.id];
      nameEl.classList.toggle('muted', drumMuted[track.id]);
    });
    row.appendChild(nameEl);

    // 16 step buttons
    for (let i = 0; i < 16; i++) {
      const s = document.createElement('div');
      s.className = 'dstep';
      s.dataset.track = track.id;
      s.dataset.step = i;
      s.style.setProperty('--tc', track.color);
      s.addEventListener('click', () => {
        drumPat[track.id][i] ^= 1;
        s.classList.toggle('on', !!drumPat[track.id][i]);
        if (drumPat[track.id][i]) s.style.background = track.color;
        else s.style.background = '';
      });
      s.addEventListener('contextmenu', e => {
        e.preventDefault();
        s.classList.toggle('accent');
        drumVels[track.id][i] = s.classList.contains('accent') ? 1.0 : 0.7;
      });
      row.appendChild(s);
    }

    // Volume slider
    const volWrap = document.createElement('div');
    volWrap.style.cssText = 'display:flex;align-items:center;gap:2px;padding:0 4px';
    const volSl = document.createElement('input');
    volSl.type = 'range'; volSl.min = 0; volSl.max = 100; volSl.value = track.vol;
    volSl.className = 'drum-vol';
    volSl.title = 'Track volume';
    volSl.addEventListener('input', () => { track.vol = +volSl.value; });
    volWrap.appendChild(volSl);
    row.appendChild(volWrap);

    // Tune display (click to cycle)
    const tuneEl = document.createElement('div');
    tuneEl.className = 'drum-tune';
    tuneEl.textContent = '\u00d71.0';
    tuneEl.title = 'Click to raise pitch, right-click to lower';
    const tuneSteps = [0.5, 0.7, 0.85, 1.0, 1.2, 1.5, 2.0];
    let tuneIdx = tuneSteps.indexOf(1.0);
    tuneEl.addEventListener('click', () => {
      tuneIdx = (tuneIdx + 1) % tuneSteps.length;
      track.tune = tuneSteps[tuneIdx];
      tuneEl.textContent = '\u00d7' + tuneSteps[tuneIdx].toFixed(1);
    });
    tuneEl.addEventListener('contextmenu', e => {
      e.preventDefault();
      tuneIdx = (tuneIdx - 1 + tuneSteps.length) % tuneSteps.length;
      track.tune = tuneSteps[tuneIdx];
      tuneEl.textContent = '\u00d7' + tuneSteps[tuneIdx].toFixed(1);
    });
    row.appendChild(tuneEl);

    rows.appendChild(row);
  });

  // Load default preset
  loadDrumPreset('Classic DnB');
  document.querySelector('.dpbtn').classList.add('on');
}

function loadDrumPreset(name) {
  const preset = DRUM_PRESETS[name];
  if (!preset) return;
  DRUM_TRACKS.forEach(t => {
    drumPat[t.id] = [...(preset[t.id] || new Array(16).fill(0))];
    drumVels[t.id] = new Array(16).fill(0.8);
    // Update UI
    for (let i = 0; i < 16; i++) {
      const s = document.querySelector(`[data-track="${t.id}"][data-step="${i}"]`);
      if (!s) continue;
      const on = !!drumPat[t.id][i];
      s.classList.toggle('on', on);
      s.classList.remove('accent', 'cur');
      s.style.background = on ? t.color : '';
    }
  });
}

function drumClear() {
  DRUM_TRACKS.forEach(t => {
    drumPat[t.id].fill(0);
    drumVels[t.id].fill(0.8);
    for (let i = 0; i < 16; i++) {
      const s = document.querySelector(`[data-track="${t.id}"][data-step="${i}"]`);
      if (s) { s.classList.remove('on','accent','cur'); s.style.background = ''; }
    }
  });
}

function drumRand() {
  DRUM_TRACKS.forEach((t, ti) => {
    // Density decreases for higher-pitched instruments
    const density = ti === 0 ? 0.25 : ti === 1 ? 0.25 : ti < 4 ? 0.4 : 0.3;
    for (let i = 0; i < 16; i++) {
      drumPat[t.id][i] = Math.random() < density ? 1 : 0;
      // Ensure kick and snare on downbeats
      if (ti === 0 && i === 0) drumPat[t.id][i] = 1;
      if (ti === 1 && i === 4) drumPat[t.id][i] = 1;
      if (ti === 1 && i === 12) drumPat[t.id][i] = 1;
      drumVels[t.id][i] = 0.6 + Math.random() * 0.4;
      const s = document.querySelector(`[data-track="${t.id}"][data-step="${i}"]`);
      if (s) { s.classList.toggle('on', !!drumPat[t.id][i]); s.style.background = drumPat[t.id][i] ? t.color : ''; }
    }
  });
}

function drumHumanize() {
  // Slightly randomize velocities on all active steps
  DRUM_TRACKS.forEach(t => {
    for (let i = 0; i < 16; i++) {
      if (drumPat[t.id][i]) {
        drumVels[t.id][i] = Math.max(0.4, Math.min(1, drumVels[t.id][i] + (Math.random() - 0.5) * 0.3));
      }
    }
  });
}

function setSwing(v) {
  drumSwing = v;
  document.getElementById('swingVal').textContent = v + '%';
}
function setDrumMasterVol(v) {
  drumMasterVolume = v / 100;

}

// Draw drum output waveform
function drawDrumViz() {
  const cv = document.getElementById('drumVizCanvas');
  if (!cv || !drumAnalyser) return;
  const W = cv.width = cv.offsetWidth, H = cv.height = cv.offsetHeight;
  const c = cv.getContext('2d');
  const buf = new Uint8Array(drumAnalyser.frequencyBinCount);
  drumAnalyser.getByteFrequencyData(buf);
  c.fillStyle = '#040407'; c.fillRect(0, 0, W, H);
  const colors = ['#ff3366','#ff8800','#ffcc00','#00ffcc','#00cc99','#aa66ff','#ff6644','#44aaff'];
  const bw = W / buf.length;
  for (let i = 0; i < buf.length; i++) {
    const v = buf[i] / 255;
    const ci = Math.floor(i / buf.length * colors.length);
    c.fillStyle = colors[ci] || '#ffffff';
    c.fillRect(i * bw, H - v * H, bw, v * H);
  }
}

// Update drum step highlight
function updateDrumHighlight(step) {
  document.querySelectorAll('.dstep').forEach(s => s.classList.remove('cur'));
  DRUM_TRACKS.forEach(t => {
    const s = document.querySelector(`[data-track="${t.id}"][data-step="${step}"]`);
    if (s) s.classList.add('cur');
  });
}
